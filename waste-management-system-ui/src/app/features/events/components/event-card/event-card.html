<mat-card class="p-4 hover:shadow-lg transition bg-white! cursor-pointer">

     <div class="flex justify-between">
          <h3 class="font-semibold text-lg">
               MG Road Cleanup Drive
          </h3>

          <mat-icon class="text-green-600">
               event
          </mat-icon>
     </div>

     <p class="text-sm text-gray-500 mt-1">
          📍 MG Road, Bangalore
     </p>

     <p class="text-sm text-gray-500">
          🕒 Saturday 30th March, 2026, 10:30am
     </p>

     <!-- <p class="text-sm mt-3 text-gray-600">
          Join us for a cleanup drive on MG Road!
          Let's come together to make our city cleaner and greener.
          Volunteers will be provided with gloves, bags, and refreshments.
          All are welcome to participate and make a positive impact on our environment.
     </p> -->

     <div class="flex justify-between items-center mt-4">
          <div class="flex items-center gap-2 bg-blue-100 p-3 rounded-md">
               <mat-icon class="text-blue-600">group</mat-icon>
               <span class="text-sm text-blue-600 font-semibold whitespace-nowrap">
                    22 joined
               </span>
          </div>


          @if(!joinedEvent()){
          <button mat-raised-button (click)="joined()" class="bg-teal-800! text-white!">Join
          </button>
          }


          @if(joinedEvent()){
          <button mat-stroked-button (click)="joined()" class="bg-red-600! text-white!">
               Cancel
          </button>
          }

     </div>

</mat-card>
