<mat-card class="p-4 hover:shadow-lg! transition bg-white!">
  <div class="flex justify-between font-family-sans">
    <div class="flex items-center gap-4">
      <!-- Avatar -->
      <img src="https://i.pravatar.cc/100" class="w-12 h-12 rounded-full object-cover" />

      <!-- User Info -->
      <div>
        <h3 class="font-semibold text-lg text-gray-800">John Doe</h3>

        <p class="text-sm text-gray-500">johndoe@email.com</p>

        <p class="text-xs text-gray-400 mt-1">Requested 2 hours ago</p>

        <div class="flex gap-4 mt-2 text-sm text-gray-600">
          <span>Events Attended: <b>4</b></span>
          <span>Reports: <b>12</b></span>
        </div>
      </div>
    </div>

    <div class="flex flex-col items-end">
      <div class="flex items-center">
        <span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full"> Approved </span>
      </div>
      <div class="flex justify-between items-center mt-4 gap-4">
        <button mat-icon-button disableRipple class="bg-white! text-teal-800! rounded-sm">
          <mat-icon>check</mat-icon>
        </button>
        <button mat-icon-button disableRipple class="bg-white! text-red-600! rounded-sm">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </div>
  </div>
</mat-card>
