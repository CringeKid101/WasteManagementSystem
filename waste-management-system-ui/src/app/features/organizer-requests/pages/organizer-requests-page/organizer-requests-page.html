<div class="p-6 space-y-6">

     <h1 class="text-xl font-semibold text-white-800 font-family-heading">
          Accept or Reject Pending Organizer Requests
     </h1>

     <app-organizer-request-filter></app-organizer-request-filter>
     <!-- Events Grid -->
     <div [animate.leave]="['card-vanish']" class="grid md:grid-rows-1 lg:grid-rows-1 gap-6">
          @for(request of organizerRequests; track request.Id){
               <app-organizer-request-card [request]="request"></app-organizer-request-card>
          }
     </div>
</div>
